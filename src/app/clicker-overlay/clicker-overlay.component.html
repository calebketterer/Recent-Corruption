<div class="global-counter-overlay" 
     [ngClass]="{'faded': isGlobalFading}"
     [style.top]="globalNumPos.top" 
     [style.left]="globalNumPos.left"
     [style.transform]="'translate(-50%, -50%) rotate(' + globalNumPos.rotate + ')'">
  {{ displayCount }}
</div>

<div *ngFor="let target of targets" 
     class="clicker-target" 
     [class.dragging]="target.isDragging"
     [style.top.px]="target.top" 
     [style.left.px]="target.left"
     (mousedown)="startDrag($event, target)"
     (click)="handleTargetClick($event, target)">
  
  <span class="score-bubble">{{ target.clickCount }}</span>
  
  <svg class="target-svg" viewBox="0 0 100 100">
    <circle *ngIf="target.shape === 'circle'" cx="50" cy="50" r="42" 
            [attr.fill]="target.coreColor" [attr.stroke]="target.outlineColor" stroke-width="8" />
    
    <rect *ngIf="target.shape === 'square'" x="12" y="12" width="76" height="76" rx="4"
          [attr.fill]="target.coreColor" [attr.stroke]="target.outlineColor" stroke-width="8" />

    <use *ngIf="target.shape !== 'circle' && target.shape !== 'square'"
         [attr.xlink:href]="'#shape-' + target.shape"
         [attr.fill]="target.coreColor" 
         [attr.stroke]="target.outlineColor" 
         stroke-width="8" 
         stroke-linejoin="round" />
  </svg>
</div>

<svg width="0" height="0" style="position: absolute;">
  <defs>
    <symbol id="shape-triangle" viewBox="0 0 100 100">
      <polygon points="50,10 90,90 10,90" />
    </symbol>
    <symbol id="shape-pentagon" viewBox="0 0 100 100">
      <polygon points="50,10 90,40 75,90 25,90 10,40" />
    </symbol>
    <symbol id="shape-hexagon" viewBox="0 0 100 100">
      <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" />
    </symbol>
    <symbol id="shape-octagon" viewBox="0 0 100 100">
      <polygon points="32,10 68,10 90,32 90,68 68,90 32,90 10,68 10,32" />
    </symbol>
  </defs>
</svg>
